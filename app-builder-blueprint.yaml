# Conceptual Blueprint for Adobe App Builder (AIO) Integration
# This configuration would live in your App Builder project to orchestrate the Remotion Docker Appliance.

project:
  name: aem-remotion-orchestrator

actions:
  render-video:
    function: actions/render-trigger/index.js
    runtime: 'nodejs:18'
    inputs:
      # These would be configured in the App Builder console
      DOCKER_WORKER_URL: https://your-remotion-worker.com/render
      AEM_BASE_URL: $AEM_BASE_URL
      AEM_TOKEN: $AEM_TOKEN
    annotations:
      require-adobe-auth: true
      final: true

